name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel in-progress runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Windows (MSYS2 UCRT64) — pacboy + GCC, no vcpkg, no Visual Studio
  # ---------------------------------------------------------------------------
  windows:
    name: Windows (MSYS2 UCRT64, GCC)
    runs-on: windows-latest
    timeout-minutes: 60
    # Run every step in MSYS2 bash so we can invoke the project's
    # build-msys2.sh script directly. The UCRT64 environment matches
    # the one documented in scripts/build-msys2.sh.
    defaults:
      run:
        shell: msys2 {0}
    steps:
      # actions/checkout would otherwise rewrite LF to CRLF on Windows,
      # which would break shell scripts and the MSYS2 toolchain.
      - name: Disable autocrlf before checkout
        shell: bash
        run: git config --global core.autocrlf input

      - uses: actions/checkout@v4

      - name: Setup MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          # `install` is for MSYS2-distribution packages (git, base-devel
          # gives us bash/make/etc.); `pacboy` is the shorthand for the
          # UCRT64-prefixed mingw-w64 packages and matches the names that
          # scripts/build-msys2.sh passes when run locally with
          # `--no-install`.
          install: >-
            git
            base-devel
          pacboy: >-
            toolchain:p
            cmake:p
            ninja:p
            pkgconf:p
            boost:p
            boost-libs:p
            qt5-base:p
            qt5-xmlpatterns:p
            eigen3:p
            fftw:p
            openexr:p
            imath:p
            libjpeg-turbo:p
            libpng:p
            xerces-c:p
            glew:p
            python:p
            python-numpy:p

      - name: Configure + build
        run: ./scripts/build-msys2.sh --no-install --clean

      - name: Render smoke test
        shell: msys2 {0}
        run: |
          set -e
          cat > ci_scene.xml <<'XML'
          <scene version="0.6.0">
              <integrator type="path"><integer name="maxDepth" value="2"/></integrator>
              <sensor type="perspective">
                  <float name="fov" value="45"/>
                  <transform name="toWorld">
                      <lookat origin="0, 0, 3" target="0, 0, 0" up="0, 1, 0"/>
                  </transform>
                  <sampler type="halton"><integer name="sampleCount" value="4"/></sampler>
                  <film type="ldrfilm">
                      <integer name="width" value="32"/>
                      <integer name="height" value="32"/>
                      <string name="fileFormat" value="png"/>
                  </film>
              </sensor>
              <emitter type="constant"><spectrum name="radiance" value="1.5"/></emitter>
              <shape type="sphere">
                  <float name="radius" value="1"/>
                  <bsdf type="diffuse"><spectrum name="reflectance" value="0.8"/></bsdf>
              </shape>
          </scene>
          XML
          ./build/cmake-msys2-release/bin/mitsuba.exe -o ci_render.png -q ci_scene.xml
          test -s ci_render.png
          magic=$(head -c 8 ci_render.png | od -An -tx1 | tr -d ' \n')
          test "$magic" = "89504e470d0a1a0a"

      - name: Upload render artefact
        uses: actions/upload-artifact@v4
        with:
          name: windows-render
          path: ci_render.png
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux (Ubuntu 24.04) — apt only, no vcpkg
  # ---------------------------------------------------------------------------
  linux:
    name: Linux (Ubuntu 24.04, apt)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libboost-filesystem-dev libboost-thread-dev libboost-chrono-dev \
            libboost-date-time-dev libboost-atomic-dev libboost-python-dev \
            zlib1g-dev libopenexr-dev libimath-dev \
            libjpeg-turbo8-dev libpng-dev libxerces-c-dev libglew-dev \
            libeigen3-dev libfftw3-dev \
            qtbase5-dev qttools5-dev libqt5xmlpatterns5-dev libqt5opengl5-dev \
            python3-dev python3-numpy \
            libx11-dev libxmu-dev libxi-dev libgl-dev libglu1-mesa-dev libxxf86vm-dev

      - name: Configure + build
        run: ./scripts/build-linux.sh --no-apt

      - name: Render smoke test
        run: |
          cat > /tmp/ci_scene.xml <<'XML'
          <scene version="0.6.0">
              <integrator type="path"><integer name="maxDepth" value="2"/></integrator>
              <sensor type="perspective">
                  <float name="fov" value="45"/>
                  <transform name="toWorld">
                      <lookat origin="0, 0, 3" target="0, 0, 0" up="0, 1, 0"/>
                  </transform>
                  <sampler type="halton"><integer name="sampleCount" value="4"/></sampler>
                  <film type="ldrfilm">
                      <integer name="width" value="32"/>
                      <integer name="height" value="32"/>
                      <string name="fileFormat" value="png"/>
                  </film>
              </sensor>
              <emitter type="constant"><spectrum name="radiance" value="1.5"/></emitter>
              <shape type="sphere">
                  <float name="radius" value="1"/>
                  <bsdf type="diffuse"><spectrum name="reflectance" value="0.8"/></bsdf>
              </shape>
          </scene>
          XML
          ./build/cmake-linux-release/bin/mitsuba -o /tmp/ci_render.png -q /tmp/ci_scene.xml
          file /tmp/ci_render.png

      - name: Upload render artefact
        uses: actions/upload-artifact@v4
        with:
          name: linux-render
          path: /tmp/ci_render.png
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS (Apple Silicon) — Homebrew + Apple Clang
  # ---------------------------------------------------------------------------
  macos:
    name: macOS (Apple Silicon, Homebrew)
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (brew)
        run: |
          brew update
          brew install --quiet \
            cmake \
            autoconf automake pkg-config \
            qt@5 boost boost-python3 \
            openexr libjpeg-turbo libpng \
            xerces-c glew eigen fftw

      - name: Configure + build
        run: ./scripts/build-macos.sh --no-brew

      - name: Render smoke test
        # mtsgui is not built on macOS (BWToolkitFramework is defunct);
        # the CLI tools are the supported render entry point.
        run: |
          cat > /tmp/ci_scene.xml <<'XML'
          <scene version="0.6.0">
              <integrator type="path"><integer name="maxDepth" value="2"/></integrator>
              <sensor type="perspective">
                  <float name="fov" value="45"/>
                  <transform name="toWorld">
                      <lookat origin="0, 0, 3" target="0, 0, 0" up="0, 1, 0"/>
                  </transform>
                  <sampler type="halton"><integer name="sampleCount" value="4"/></sampler>
                  <film type="ldrfilm">
                      <integer name="width" value="32"/>
                      <integer name="height" value="32"/>
                      <string name="fileFormat" value="png"/>
                  </film>
              </sensor>
              <emitter type="constant"><spectrum name="radiance" value="1.5"/></emitter>
              <shape type="sphere">
                  <float name="radius" value="1"/>
                  <bsdf type="diffuse"><spectrum name="reflectance" value="0.8"/></bsdf>
              </shape>
          </scene>
          XML
          ./build/cmake-macos-release/bin/mitsuba -o /tmp/ci_render.png -q /tmp/ci_scene.xml
          file /tmp/ci_render.png

      - name: Upload render artefact
        uses: actions/upload-artifact@v4
        with:
          name: macos-render
          path: /tmp/ci_render.png
          if-no-files-found: error
